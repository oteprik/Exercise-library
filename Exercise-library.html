const g=document.getElementById('grid');
videos.forEach(v=>{
const c=document.createElement('div');c.className='card';
let media='';
if(v.hasEmbed){
const src='https://www.facebook.com/plugins/video.php?height=476&href='+encodeURIComponent(v.url)+'&show_text=false&width=267&t=0';
media=`<iframe src="${src}" width="267" height="476" style="display:block;margin:auto;border:none"></iframe>`;
} else {
media=`<div style="height:476px;border:2px dashed #bbb;display:flex;align-items:center;justify-content:center;text-align:center"><a target="_blank" href="${v.url}">Otevřít Reel</a></div>`;
}
c.innerHTML=`<div class="meta"><span>⭐ ${v.rating}</span><span>${v.hasEmbed?'🎬':'🔗'}</span></div><h3><a target="_blank" href="${v.url}">${v.title}</a></h3>${media}<div class="note">${v.notes}</div>`;
g.appendChild(c);
});
