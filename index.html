const KEY='kackaLikes';

function loadLikes(){return JSON.parse(localStorage.getItem(KEY)||'{}');}
function saveLikes(v){localStorage.setItem(KEY,JSON.stringify(v));}
function score(v){const l=loadLikes();return (v.rating||0)+(l[v.url]||0);}

function like(url){
    const l = loadLikes();
    l[url] = (l[url] || 0) + 1;
    saveLikes(l);

    const video = videos.find(v => v.url === url);
    const score = document.querySelector(`[data-score="${url}"]`);

    if(score){
        score.textContent = `❤️ ${(video.rating || 0) + l[url]}`;
    }
}

function resetOne(url){
    const l = loadLikes();
    delete l[url];
    saveLikes(l);

    const video = videos.find(v => v.url === url);
    const score = document.querySelector(`[data-score="${url}"]`);

    if(score){
        score.textContent = `❤️ ${video.rating || 0}`;
    }
}

function resetAll(){
 if(confirm('Vymazat všechna lokální hodnocení?')){
   localStorage.removeItem(KEY);
   render();
 }
}

function render(){
 const likes=loadLikes();
 const arr=[...videos].sort((a,b)=>
   score(b)-score(a) ||
   (b.rating-a.rating) ||
   (Number(b.hasEmbed)-Number(a.hasEmbed))
 );
 const g=document.getElementById('grid');
 g.innerHTML='';
 arr.forEach(v=>{
   const c=document.createElement('div');
   c.className='card';
   let media='';
   if(v.hasEmbed){
      const src='https://www.facebook.com/plugins/video.php?height=476&href='+encodeURIComponent(v.url)+'&show_text=false&width=267&t=0';
      media=`<iframe src="${src}" width="267" height="476" style="display:block;margin:auto;border:none"></iframe>`;
   }else{
   media=`
    <div style="
      height:476px;
      border:2px dashed #bbb;
      border-radius:8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:12px;
    ">
    <div style="font-size:48px;">🎬</div>
    <div>Embed momentálně není dostupný.</div>
    <a target="_blank" href="${v.url}">
        Otevřít Reel
    </a>
    </div>`;
    }
   c.innerHTML=`
   <div class="meta"><span class="score" data-score="${v.url}">❤️ ${score(v)}</span><a target="_blank" href="${v.url}">${v.title}</a><span>${v.hasEmbed?'🎬':'🔗'}</span></div>
   ${media}
   <div class="actions">
      <button onclick="resetOne('${v.url}')">🗑</button>
      
      <button onclick="like('${v.url}')">❤️</button>
   </div>`;
   g.appendChild(c);
 });
 if(!document.getElementById('resetAllBtn')){
   const d=document.createElement('div');
   d.style='text-align:center;padding:24px';
   d.innerHTML='<button id="resetAllBtn" onclick="resetAll()">🗑 Vymazat všechna lokální hodnocení</button>';
   document.body.appendChild(d);
 }
}
render();
